<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수의 곱셈 수직선 레일바이크</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            padding: 50px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 900px;
            margin: auto;
        }
        h2 { color: #2c3e50; margin-bottom: 30px; }
        
        /* 입력창 스타일 */
        .input-group {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            background: #e9ecef;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            width: 70px;
            padding: 10px;
            font-size: 20px;
            text-align: center;
            border: 2px solid #ced4da;
            border-radius: 8px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }

        /* 수직선 레일 영역 */
        .rail-wrapper {
            position: relative;
            margin: 100px 0 60px 0;
            padding: 0 50px; /* 좌우 여백 */
        }

        /* 수직선 (화살표 포함) */
        .number-line {
            position: relative;
            width: 100%;
            height: 4px;
            background-color: #333;
        }
        .number-line::before, .number-line::after {
            content: '';
            position: absolute;
            top: -6px;
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
        }
        .number-line::before { left: -15px; border-right: 15px solid #333; } /* 왼쪽 화살표 */
        .number-line::after { right: -15px; border-left: 15px solid #333; } /* 오른쪽 화살표 */

        /* 눈금 스타일 */
        .tick {
            position: absolute;
            width: 2px;
            height: 15px;
            background-color: #333;
            top: -5px;
        }
        .tick-label {
            position: absolute;
            top: 20px;
            transform: translateX(-50%);
            font-size: 14px;
            color: #555;
            font-weight: bold;
        }
        .tick-zero { height: 25px; top: -10px; background-color: #e74c3c; width: 3px; }
        .label-zero { color: #e74c3c; font-size: 18px; top: 25px; }

        /* 기차 스타일 */
        .train {
            position: absolute;
            bottom: 15px; /* 선 바로 위에 위치 */
            left: 50%;
            font-size: 50px;
            transform: translateX(-50%);
            transition: left 2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            z-index: 10;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        .result-display {
            font-size: 26px;
            margin-top: 40px;
            padding: 20px;
            border-top: 2px dashed #dee2e6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚂 정수의 곱셈 수직선 모델</h2>

    <div class="input-group">
        <label>(속력) <input type="number" id="v" value="2"></label>
        <span>×</span>
        <label>(시간) <input type="number" id="t" value="3"></label>
        <button onclick="startTrip()">출발하기</button>
    </div>

    <div class="rail-wrapper">
        <div class="number-line" id="line">
            </div>
        <div class="train" id="train">🚂</div>
    </div>

    <div class="result-display" id="resultText">
        숫자를 입력하고 버튼을 눌러주세요!
    </div>
</div>

<script>
    const line = document.getElementById('line');
    const range = 15; // 좌우 눈금 범위 (-15 ~ +15)

    // 1. 수직선 눈금 자동 생성
    for (let i = -range; i <= range; i++) {
        const tick = document.createElement('div');
        tick.className = 'tick';
        if (i === 0) tick.classList.add('tick-zero');
        
        // 위치 계산 (0을 50% 지점으로)
        const position = 50 + (i * (100 / (range * 2 + 2)));
        tick.style.left = position + '%';

        const label = document.createElement('div');
        label.className = 'tick-label';
        if (i === 0) label.classList.add('label-zero');
        label.innerText = i;
        label.style.left = position + '%';

        line.appendChild(tick);
        line.appendChild(label);
    }

    function startTrip() {
        const v = parseInt(document.getElementById('v').value) || 0;
        const t = parseInt(document.getElementById('t').value) || 0;
        const result = v * t;
        const train = document.getElementById('train');
        const resDiv = document.getElementById('resultText');

        // 2. 기차 이동 위치 계산
        // 눈금 범위(-15 ~ 15)를 벗어나지 않도록 제한
        let moveValue = result;
        if (moveValue > range) moveValue = range;
        if (moveValue < -range) moveValue = -range;

        const targetPercent = 50 + (moveValue * (100 / (range * 2 + 2)));
        train.style.left = targetPercent + '%';

        // 3. 기차 방향 전환 (속력이 음수면 왼쪽을 바라봄)
        if (v < 0) {
            train.style.transform = 'translateX(-50%) scaleX(-1)';
        } else {
            train.style.transform = 'translateX(-50%) scaleX(1)';
        }

        // 4. 결과 메시지 구성
        const vSign = v >= 0 ? '+' : '';
        const tSign = t >= 0 ? '+' : '';
        const rSign = result >= 0 ? '+' : '';

        resDiv.innerHTML = `
            <strong>계산식: (${vSign}${v}) × (${tSign}${t}) = ${rSign}${result}</strong><br>
            <small style="color: #666; font-size: 16px;">
                ${v >= 0 ? '양의 방향' : '음의 방향'}으로 초당 ${Math.abs(v)}칸씩, 
                ${t >= 0 ? t + '초 후' : Math.abs(t) + '초 전'}의 위치입니다.
            </small>
        `;
    }
</script>

</body>
</html>
