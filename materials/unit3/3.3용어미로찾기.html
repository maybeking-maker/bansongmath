<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중1 수학 일차식 미로 탈출</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            max-width: 650px;
            width: 100%;
            text-align: center;
        }
        
        /* 최상단 미션 지령 바 */
        .mission-box {
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            margin-bottom: 20px;
            font-size: 14px;
            color: #2c3e50;
            line-height: 1.6;
        }
        .mission-box h3 { margin: 0 0 5px 0; color: #2980b9; font-size: 16px; }

        /* 상태 바 (목숨) */
        .status-bar {
            display: flex;
            justify-content: center;
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid #e2e8f0;
        }
        .lives { color: #e74c3c; }

        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 26px; font-weight: bold; }
        .stage-info { font-weight: bold; color: #e67e22; font-size: 20px; margin-bottom: 15px; }
        
        .label-text { font-size: 14px; color: #7f8c8d; font-weight: bold; margin-bottom: 5px; text-align: left; }

        /* 수식 박스 */
        .expression-box {
            background-color: #2c3e50;
            color: #f1c40f;
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        /* 세로형 분수 CSS */
        .frac {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            align-items: center;
            line-height: 1.1;
            padding: 0 6px;
        }
        .frac .top {
            border-bottom: 3px solid #f1c40f;
            padding-bottom: 2px;
            font-size: 30px;
        }
        .frac .bottom {
            padding-top: 2px;
            font-size: 30px;
        }

        /* 옵션 안의 분수용 작은 스타일 */
        .door-text .frac .top { border-bottom: 2px solid white; font-size: 18px; }
        .door-text .frac .bottom { font-size: 18px; }

        /* 질문 표시 영역 */
        .question-box {
            background-color: #f1f2f6;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px; 
            color: #333; 
            margin-bottom: 30px; 
            font-weight: bold; 
            line-height: 1.5;
            border: 1px dashed #ced6e0;
        }
        
        /* 문 가로 배치 컨테이너 */
        .doors-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 20px;
        }

        /* 갈색 아치형 문 디자인 */
        .door-btn {
            flex: 1;
            max-width: 180px;
            height: 220px;
            background-color: #7a4a26; 
            border: 5px solid #4a2c14;  
            border-radius: 50px 50px 0 0; 
            color: white;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, background-color 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px 10px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
        }
        /* 금빛 문고리 */
        .door-btn::after {
            content: '';
            position: absolute;
            top: 55%;
            right: 15px;
            width: 12px;
            height: 12px;
            background-color: #ffd700; 
            border-radius: 50%;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }
        .door-btn:hover:not(:disabled) {
            background-color: #915830;
            transform: translateY(-5px);
        }
        /* 문 열림 시각 효과 */
        .door-btn.opened {
            background-color: #1a252f !important;
            border-color: #11181f !important;
            color: #7f8c8d;
            transform: scale(0.95);
        }
        .door-btn:disabled { cursor: not-allowed; }

        .door-number {
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 3px 10px;
            border-radius: 10px;
            align-self: center;
            color: #f1c40f;
        }
        .door-text {
            font-size: 20px;
            font-weight: bold;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: keep-all;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* 결과 메시지 */
        .result-message { margin-top: 20px; font-size: 20px; font-weight: bold; min-height: 60px; line-height: 1.5; }
        .success { color: #27ae60; }
        .fail { color: #e74c3c; }
        
        .reset-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.4);
            transition: background-color 0.2s;
        }
        .reset-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="mission-box">
        <h3>📜 미로 탈출 미션 지령</h3>
        방마다 주어지는 <strong>[주어진 식]</strong>과 <strong>[수수께끼]</strong>를 잘 읽으세요.<br>
        올바른 정답이 적힌 <strong>갈색 문</strong>을 클릭하면 다음 방으로 갈 수 있습니다.<br>
        틀리면 <strong>목숨(❤️)</strong>이 깎이며, 목숨을 모두 잃으면 처음부터 다시 시작해야 합니다.
    </div>

    <div class="status-bar">
        <div class="lives" id="lives-display">목숨: ❤️❤️❤️</div>
    </div>

    <h1>🏰 문자와 식 '용어 마스터' 미로 🏰</h1>
    <hr style="border: 0; height: 1px; background: #ddd; margin: 15px 0 25px 0;">

    <div id="game-screen">
        <div class="stage-info" id="stage-title"></div>
        
        <div class="label-text">🔍 주어진 식:</div>
        <div class="expression-box" id="expr-display"></div>
        
        <div class="label-text">🧙 문지기의 수수께끼:</div>
        <div class="question-box" id="question-display"></div>
        
        <div class="doors-container">
            <button class="door-btn" onclick="checkAnswer(0)" id="door0">
                <span class="door-number">1번 문</span>
                <span class="door-text" id="door-text0"></span>
            </button>
            <button class="door-btn" onclick="checkAnswer(1)" id="door1">
                <span class="door-number">2번 문</span>
                <span class="door-text" id="door-text1"></span>
            </button>
            <button class="door-btn" onclick="checkAnswer(2)" id="door2">
                <span class="door-number">3번 문</span>
                <span class="door-text" id="door-text2"></span>
            </button>
        </div>
    </div>

    <div class="result-message" id="result-display"></div>
    <div id="action-area"></div>
</div>

<script>
// 중1 수학 문자와 식 단원 핵심 개념 완벽 반영한 15개 문제 풀 (요청 반영)
const problemPool = [
    { expr: "2x² - 3x + 5", q: "이 식에서 'x의 계수'가 적힌 문은 어디일까요? (부호 주의!)", options: ["2", "-3", "5"], ans: 1 },
    { expr: "-x² + 4", q: "이 다항식의 '차수'는 얼마일까요? 차수와 일치하는 문을 고르세요.", options: ["1차", "2차", "3차"], ans: 1 },
    { expr: "3x² + x - 1", q: "이 식에서 '상수항'이 적힌 문을 찾아보세요. (부호 조심!)", options: ["3", "1", "-1"], ans: 2 },
    { expr: "5x - 2", q: "이 식은 '일차식'이 맞을까요? 올바른 설명이 적힌 문을 고르세요.", options: ["맞다 (1차식)", "아니다 (상수항 때문에)", "아니다 (2차식이다)"], ans: 0 },
    { expr: "-3x", q: "이 식에 대한 설명 중 '거짓말(틀린 설명)'을 하고 있는 문은 어디일까요?", options: ["항이 1개인 단항식이다.", "단항식은 다항식이 아니다.", "x의 계수는 -3이다."], ans: 1 },
    { expr: "<div class='frac'><span class='top'>1</span><span class='bottom'>2</span></div>x + 7", q: "이 식을 이루고 있는 '항'은 총 몇 개일까요? 개수가 적힌 문을 고르세요.", options: ["1개", "2개", "3개"], ans: 1 },
    { expr: "-2a² + 5a", q: "문자가 a로 바뀌었습니다! 이 식에서 'a²의 계수'가 적힌 문은?", options: ["-2", "5", "0"], ans: 0 },
    { expr: "4b - 9", q: "이 식에서 '상수항'을 올바르게 나타낸 문을 선택하세요.", options: ["4", "9", "-9"], ans: 2 },
    { expr: "7x³ - x + 1", q: "이 다항식의 '차수'는 얼마일까요?", options: ["1차식", "2차식", "3차식"], ans: 2 },
    { expr: "-5y - 8", q: "이 식에서 'y의 계수'는 얼마일까요? 부호를 잊지 마세요!", options: ["5", "-5", "-8"], ans: 1 },
    { expr: "<div class='frac'><span class='top'>x</span><span class='bottom'>3</span></div> + 2", q: "이 식에서 'x의 계수'는 무엇일까요? 분수 형태를 잘 생각해 보세요!", options: ["3", "1", "<div class='frac'><span class='top'>1</span><span class='bottom'>3</span></div>"], ans: 2 },
    { expr: "0.1x² - 0.5x", q: "이 식에서 'x의 계수'를 올바르게 말한 문을 고르세요.", options: ["0.1", "-0.5", "0.5"], ans: 1 },
    { expr: "a + b - 3", q: "이 식을 이루고 있는 '항'은 모두 몇 개일까요?", options: ["2개", "3개", "4개"], ans: 1 },
    { expr: "6", q: "상수만 덩그러니 있는 식 '6'의 '차수'는 얼마라고 해야 할까요?", options: ["0차", "1차", "차수가 없다"], ans: 0 },
    { expr: "<div class='frac'><span class='top'>4</span><span class='bottom'>x</span></div> + 1", q: "이 식은 '일차식'이 맞을까요? 함정을 조심하세요!", options: ["일차식이 맞다.", "아니다. (문자가 분모에 있으면 다항식이 아님)", "일차식이 아니라 2차식이다."], ans: 1 }
];

let currentStages = [];
let currentStageIdx = 0;
let lives = 3;

function updateStatusUI() {
    let heartStr = "목숨: ";
    for(let i=0; i<3; i++) {
        heartStr += (i < lives) ? "❤️" : "💔";
    }
    document.getElementById("lives-display").innerText = heartStr;
}

function initGame() {
    // 15개 전체 풀에서 5문제를 무작위로 새로 섞어서 추출 (매 판 문제가 완전히 바뀜)
    const shuffled = [...problemPool].sort(() => 0.5 - Math.random());
    currentStages = shuffled.slice(0, 5);
    currentStageIdx = 0;
    lives = 3;
    
    document.getElementById("action-area").innerHTML = "";
    document.getElementById("result-display").innerHTML = "";
    document.getElementById("game-screen").style.display = "block";
    
    updateStatusUI();
    showStage();
}

function showStage() {
    if(currentStageIdx >= 5) {
        // [요청반영] 클리어 시 재도전 버튼 활성화 및 새로운 문제 매칭 가능하도록 설정
        document.getElementById("game-screen").style.display = "none";
        document.getElementById("result-display").innerHTML = "<span class='success'>🎉 축하합니다! 모든 수수께끼를 풀고 미로를 완벽하게 탈출했습니다! 🎉<br><br>🏅 당신은 이제 중1 문자와 식 '용어 마스터'입니다!</span>";
        document.getElementById("action-area").innerHTML = "<button class='reset-btn' onclick='initGame()'>새로운 미로 도전하기 🔄</button>";
        return;
    }

    const stage = currentStages[currentStageIdx];
    document.getElementById("stage-title").innerText = `🚪 STAGE ${currentStageIdx + 1} / 5번째 방`;
    document.getElementById("expr-display").innerHTML = stage.expr;
    document.getElementById("question-display").innerText = stage.q;
    
    for(let i=0; i<3; i++) {
        const door = document.getElementById(`door${i}`);
        document.getElementById(`door-text${i}`).innerHTML = stage.options[i]; // 분수 표현을 위해 innerHTML 사용
        door.disabled = false;
        door.classList.remove("opened");
    }
}

function checkAnswer(choice) {
    const stage = currentStages[currentStageIdx];
    
    for(let i=0; i<3; i++) document.getElementById(`door${i}`).disabled = true;

    if(choice === stage.ans) {
        document.getElementById(`door${choice}`).classList.add("opened");
        document.getElementById("result-display").innerHTML = "<span class='success'>⭕ 정답입니다! 문이 열리며 다음 방으로 연결됩니다.</span>";
        currentStageIdx++;
        setTimeout(() => {
            document.getElementById("result-display").innerHTML = "";
            showStage();
        }, 1200);
    } else {
        lives--; 
        updateStatusUI();
        
        if (lives > 0) {
            document.getElementById("result-display").innerHTML = `<span class='fail'>❌ 잘못된 문입니다! 함정이 발동해 목숨을 잃었습니다.</span>`;
            setTimeout(() => {
                document.getElementById("result-display").innerHTML = "";
                for(let i=0; i<3; i++) document.getElementById(`door${i}`).disabled = false;
            }, 1200);
        } else {
            // [요청반영] 목숨 다 잃었을 때 새로고침 요구 문구만 단독 노출
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("result-display").innerHTML = "<span class='fail'>💀 GAME OVER 💀<br><br>모든 목숨을 잃었습니다.<br><strong>페이지를 새로고침(F5)하여 다시 도전해 주세요!</strong></span>";
            document.getElementById("action-area").innerHTML = ""; // 버튼 제거
        }
    }
}

// 최초 실행
initGame();
</script>

</body>
</html>
